repos:
  - repo: local
    hooks:
      - id: branch-name
        name: Check branch name
        language: script
        entry: .github/scripts/check-branch-name.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements
        files: ^provena-api/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
        files: ^provena-api/
      - id: ruff-format
        files: ^provena-api/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, provena-api/pyproject.toml]
        files: ^provena-api/
        exclude: ^provena-api/.*tests/

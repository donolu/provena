global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Django application metrics (HTTP request rate/latency, DB queries).
  - job_name: django
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Celery task throughput, latency, and per-state counts (from task events).
  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  # Redis broker metrics, including per-queue list length (queue depth).
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

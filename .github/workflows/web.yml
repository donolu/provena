name: Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: provena-web

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.check.outputs.web }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^(provena-web/|\.github/workflows/web\.yml$)'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint and type-check
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: provena-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  test:
    name: Unit tests
    needs: [changes, lint]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: provena-web/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  web-ci:
    name: Web CI
    needs: [lint, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more Web CI jobs failed."
            exit 1
          fi
          echo "All Web CI jobs passed or were skipped (no web changes)."
        working-directory: ${{ runner.temp }}

name: Branch name check

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to run against'
        required: false
        default: ''

jobs:
  check:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name matches convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          # Dependabot generates its own branch names and cannot reference an
          # issue, so the convention does not apply to its automated PRs.
          if [[ "$BRANCH" == dependabot/* ]]; then
            echo "Dependabot branch '$BRANCH' — convention check skipped."
            exit 0
          fi
          pattern='^(feature|fix|chore|docs|ci)/[0-9]+-[a-z][a-z0-9-]*$'
          if [[ ! "$BRANCH" =~ $pattern ]]; then
            echo "Branch name '$BRANCH' does not match the required pattern."
            echo ""
            echo "Expected format: <type>/<issue-number>-<short-description>"
            echo "Examples:"
            echo "  feature/42-add-search"
            echo "  fix/17-cart-reservation-race"
            echo "  chore/88-bump-ruff"
            echo "  docs/5-deployment-guide"
            echo "  ci/91-add-trivy-scan"
            echo ""
            echo "Allowed types: feature, fix, chore, docs, ci"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

name: API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to run against'
        required: false
        default: ''

defaults:
  run:
    working-directory: provena-api

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.check.outputs.api }}
      client: ${{ steps.check.outputs.client }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "client=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "${{ github.sha }}")
          # Changes under provena-api/ that can actually affect a build, test, or
          # runtime output. Docs- and config-only files are ignored so they don't
          # trigger the Django lint/test suite.
          api_code=$(printf '%s\n' "$changed" \
            | grep -E '^provena-api/' \
            | grep -vE '(^|/)\.gitignore$|\.md$|^provena-api/docs/' || true)
          if [[ -n "$api_code" ]] || printf '%s\n' "$changed" | grep -qE '^\.github/workflows/api\.yml$'; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi
          # Regenerate the OpenAPI client when API code changes (schema may shift)
          # or when the web package manifests change.
          if [[ -n "$api_code" ]] || printf '%s\n' "$changed" | grep -qE '^(provena-web/package\.json$|provena-web/package-lock\.json$|\.github/workflows/api\.yml$)'; then
            echo "client=true" >> "$GITHUB_OUTPUT"
          else
            echo "client=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-lint-secret-key
      DATABASE_URL: postgres://provena:provena@localhost:5432/provena_test
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check apps/
      - run: ruff format --check apps/
      - run: bandit -r apps/ -c pyproject.toml
      - run: pip-audit
      - run: mypy apps/

  test:
    name: Tests
    needs: [changes, lint]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: provena_test
          POSTGRES_USER: provena
          POSTGRES_PASSWORD: provena
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgres://provena:provena@localhost:5432/provena_test
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest --cov-report=json:coverage.json
      - name: Per-app coverage floor (80%)
        run: |
          python - << 'PYEOF'
          import json, sys
          with open("coverage.json") as f:
              cov = json.load(f)
          apps = [
              "accounts", "analytics", "catalogue", "inventory",
              "marketplace", "notifications", "orders", "payments", "suppliers",
          ]
          failed = []
          for app in apps:
              files = {k: v for k, v in cov["files"].items() if f"apps/{app}/" in k}
              if not files:
                  continue
              total = sum(v["summary"]["num_statements"] for v in files.values())
              covered = sum(v["summary"]["covered_lines"] for v in files.values())
              pct = (covered / total * 100) if total else 100.0
              status = "OK  " if pct >= 80 else "FAIL"
              print(f"{status}  {app}: {pct:.1f}%  ({covered}/{total} statements)")
              if pct < 80:
                  failed.append(app)
          if failed:
              print(f"\nApps below 80%: {', '.join(failed)}", file=sys.stderr)
              sys.exit(1)
          PYEOF

  generate-client:
    name: Verify OpenAPI types
    needs: [changes, test]
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-schema-key
      DATABASE_URL: sqlite:////tmp/ci_schema.db
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - name: Install API dependencies
        run: pip install -e ".[dev]"
        working-directory: provena-api
      - name: Export OpenAPI schema
        run: python manage.py spectacular --file ../provena-web/schema.yaml
        working-directory: provena-api
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: provena-web/package-lock.json
      - run: npm ci
        working-directory: provena-web
      - name: Generate TypeScript types
        run: npm run generate:types
        working-directory: provena-web
      # Verify the committed types match the schema, rather than auto-committing
      # them from CI. A bot push with GITHUB_TOKEN cannot re-trigger the required
      # checks (anti-recursion), so an auto-commit would move the PR head to a
      # commit whose checks never ran and block the PR (#104). Instead, fail here
      # and have the author regenerate locally and commit.
      - name: Verify generated types are up to date
        working-directory: .
        run: |
          if ! git diff --quiet provena-web/src/lib/api/generated/; then
            echo "::error::OpenAPI types are out of date. Run 'npm run generate:types' in provena-web/ and commit the result."
            git diff --stat provena-web/src/lib/api/generated/
            exit 1
          fi
          echo "OpenAPI types are up to date."

  api-ci:
    name: API CI
    needs: [lint, test, generate-client]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more API CI jobs failed."
            exit 1
          fi
          echo "All API CI jobs passed or were skipped (no API changes)."
        working-directory: ${{ runner.temp }}

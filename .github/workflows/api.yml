name: API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: provena-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-lint-secret-key
      DATABASE_URL: postgres://provena:provena@localhost:5432/provena_test
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check apps/
      - run: ruff format --check apps/
      - run: bandit -r apps/ -c pyproject.toml
      - run: safety check
      - run: mypy apps/

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: provena_test
          POSTGRES_USER: provena
          POSTGRES_PASSWORD: provena
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgres://provena:provena@localhost:5432/provena_test
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest --cov-report=json:coverage.json
      - name: Per-app coverage floor (80%)
        run: |
          python - << 'PYEOF'
          import json, sys
          with open("coverage.json") as f:
              cov = json.load(f)
          apps = [
              "accounts", "analytics", "catalogue", "inventory",
              "marketplace", "notifications", "orders", "payments", "suppliers",
          ]
          failed = []
          for app in apps:
              files = {k: v for k, v in cov["files"].items() if f"apps/{app}/" in k}
              if not files:
                  continue
              total = sum(v["summary"]["num_statements"] for v in files.values())
              covered = sum(v["summary"]["covered_lines"] for v in files.values())
              pct = (covered / total * 100) if total else 100.0
              status = "OK  " if pct >= 80 else "FAIL"
              print(f"{status}  {app}: {pct:.1f}%  ({covered}/{total} statements)")
              if pct < 80:
                  failed.append(app)
          if failed:
              print(f"\nApps below 80%: {', '.join(failed)}", file=sys.stderr)
              sys.exit(1)
          PYEOF

  generate-client:
    name: Generate OpenAPI client
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-schema-key
      DATABASE_URL: sqlite:////tmp/ci_schema.db
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: provena-api/pyproject.toml
      - name: Install API dependencies
        run: pip install -e ".[dev]"
        working-directory: provena-api
      - name: Export OpenAPI schema
        run: python manage.py spectacular --file ../provena-web/schema.yaml
        working-directory: provena-api
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: provena-web/package-lock.json
      - run: npm ci
        working-directory: provena-web
      - name: Generate TypeScript types
        run: npm run generate:types
        working-directory: provena-web
      - name: Check generated types are up to date
        if: github.event_name == 'pull_request'
        working-directory: .
        run: |
          if ! git diff --exit-code provena-web/src/lib/api/generated/; then
            echo "Generated types are out of date. Run 'npm run generate:types' locally after exporting the schema and commit the result."
            exit 1
          fi
      - name: Commit updated types
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add provena-web/src/lib/api/generated/
          git diff --staged --quiet || (git commit -m "chore: regenerate OpenAPI types [skip ci]" && git push)

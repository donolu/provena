name: Security Scan (OWASP ZAP)

on:
  workflow_dispatch:
  schedule:
    # Runs every Monday at 02:00 UTC
    - cron: '0 2 * * 1'

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: provena_test
          POSTGRES_USER: provena
          POSTGRES_PASSWORD: provena
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install backend dependencies
        working-directory: provena-api
        run: pip install -e ".[dev]"

      - name: Start Django server
        working-directory: provena-api
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://provena:provena@localhost:5432/provena_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-not-secret
          DEBUG: 'True'
        run: |
          python manage.py migrate --run-syncdb
          python manage.py runserver 0.0.0.0:8000 &
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:8000/api/v1/catalogue/products/; do sleep 1; done'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

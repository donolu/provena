version: 2
updates:
  # Django API (Python)
  - package-ecosystem: pip
    directory: /provena-api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, backend]
    commit-message:
      prefix: "chore(deps)"

  # Next.js web app (npm)
  - package-ecosystem: npm
    directory: /provena-web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"

  # Container base images
  - package-ecosystem: docker
    directories:
      - /provena-api
      - /provena-web
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, infrastructure]
    commit-message:
      prefix: "chore(deps)"

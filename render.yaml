# Render Blueprint for a Provena staging (or production) environment.
#
# One-click: in Render, New > Blueprint, point at this repo, then fill in the
# env vars marked `sync: false` (Stripe, email, storage, CORS, and optionally
# Typesense) when prompted. See docs/deployment.md "Option B: Render + Vercel".
#
# This provisions the backend: the Django API, the Celery worker and beat, a
# managed Postgres 16 (with the PgBouncer pool enabled), and a Redis instance.
# The frontend (provena-web) deploys separately to Vercel with NEXT_PUBLIC_API_URL
# set to the API service URL (ADR-006). Plans below are modest defaults; adjust
# to your account/tier.
#
# Note: `sync: false` variables must live on each service, not in an env group
# (Render ignores `sync: false` inside envVarGroups). Every service loads the
# production settings, which require the storage/email/CORS values at import, so
# each service carries the full secret set.

databases:
  - name: provena-db
    databaseName: provena
    postgresMajorVersion: "16"
    plan: basic-256mb
    # Enable the PgBouncer pool; the app connects via connectionPoolString and
    # migrations use the direct connectionString.
    connectionPool: pgbouncer

# Static and generated values shared across services. DJANGO_SECRET_KEY is
# generated once here so signing is consistent across the API, worker, and beat.
# Secrets are NOT here (env groups ignore `sync: false`); they are on each
# service below.
envVarGroups:
  - name: provena-shared
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PLATFORM_FEE_PERCENT
        value: "10"
      - key: EMAIL_PORT
        value: "587"
      - key: AWS_S3_REGION_NAME
        value: eu-west-2
      - key: TYPESENSE_PORT
        value: "443"
      - key: TYPESENSE_PROTOCOL
        value: https

services:
  # Redis: Celery broker, Channels (websockets), and cache. noeviction so the
  # broker never drops queued tasks under memory pressure.
  - type: redis
    name: provena-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: [] # internal only

  # Django API (Daphne / ASGI). Migrations run before each deploy against the
  # direct connection, never through the pool. The public hostname reaches
  # ALLOWED_HOSTS via RENDER_EXTERNAL_HOSTNAME (handled in production settings).
  - type: web
    name: provena-api
    runtime: docker
    dockerfilePath: ./provena-api/Dockerfile
    dockerContext: ./provena-api
    plan: starter
    healthCheckPath: /api/v1/health/
    preDeployCommand: 'DATABASE_URL="$DIRECT_DATABASE_URL" python manage.py migrate --no-input'
    envVars:
      - fromGroup: provena-shared
      - key: DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionPoolString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: provena-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false

  # Celery worker: search indexing, emails, payouts, data exports.
  - type: worker
    name: provena-worker
    runtime: docker
    dockerfilePath: ./provena-api/Dockerfile
    dockerContext: ./provena-api
    plan: starter
    dockerCommand: celery -A config.celery worker --loglevel=info --concurrency=4 -E
    envVars:
      - fromGroup: provena-shared
      - key: DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionPoolString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: provena-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false

  # Celery beat: scheduled tasks (database scheduler).
  - type: worker
    name: provena-beat
    runtime: docker
    dockerfilePath: ./provena-api/Dockerfile
    dockerContext: ./provena-api
    plan: starter
    dockerCommand: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - fromGroup: provena-shared
      - key: DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionPoolString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: provena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: provena-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false

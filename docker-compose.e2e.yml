# E2E overrides: a production web build (next start, no on-demand route
# compilation) for deterministic Playwright runs, driven through the Nginx
# origin (single origin, same as production) with the API on permissive
# development settings behind it (no CORS, no HTTPS redirect).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
#     up -d --build db redis api web nginx
services:

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      target: development
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production
      DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@pgbouncer:6432/${DB_NAME:-provena}
      DIRECT_DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@db:5432/${DB_NAME:-provena}
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ""
      STRIPE_PUBLISHABLE_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      # Search disabled for E2E: exercises the Postgres fallback path, so the
      # E2E stack needs no Typesense container.
      TYPESENSE_HOST: ""
    # No published port: reached through Nginx only, which also lets the api
    # service scale to multiple replicas for the rolling-deploy check.

  web:
    build:
      context: ./provena-web
      target: runner
      args:
        # Browser talks to the API through the Nginx origin, as in production.
        NEXT_PUBLIC_API_URL: http://localhost
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      # Server-side (Next route handlers, e.g. /api/session) must reach the API by its
      # internal address — inside the container `localhost` is the web container itself.
      API_URL_INTERNAL: http://api:8000

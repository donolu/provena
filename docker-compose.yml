services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-provena}
      POSTGRES_USER: ${DB_USER:-provena}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-provena}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-provena}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Connection pooler (transaction mode). The app connects here instead of
  # Postgres directly, so many API/worker processes multiplex a small pool of
  # server connections. Migrations use DIRECT_DATABASE_URL (Postgres directly),
  # since DDL/advisory locks are unsafe under transaction pooling.
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-provena}
      DB_PASSWORD: ${DB_PASSWORD:-provena}
      DB_NAME: ${DB_NAME:-provena}
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: ${DB_USER:-provena}
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      # psycopg/Django send these startup params; PgBouncer must be told to
      # ignore them in transaction mode or it refuses the connection.
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${DB_USER:-provena}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Full-text search engine. The API and worker use it for product search and
  # indexing; if it is unreachable the API falls back to Postgres search.
  typesense:
    image: typesense/typesense:27.1
    command:
      - "--data-dir=/data"
      - "--api-key=${TYPESENSE_API_KEY:-devsearchkey}"
      - "--enable-cors"
    volumes:
      - typesense_data:/data
    # The Typesense image has no curl/wget, so probe the port with bash's
    # /dev/tcp instead of hitting /health over HTTP.
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/8108"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Django API ────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./provena-api
      target: production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@pgbouncer:6432/${DB_NAME:-provena}
      DIRECT_DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@db:5432/${DB_NAME:-provena}
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-devsearchkey}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Readiness gate for the rolling deploy (scripts/deploy.sh): the script waits
    # for new replicas to report healthy before retiring the old ones. This does
    # not gate Nginx routing (Docker DNS has no health awareness) — Nginx may
    # briefly resolve a just-started replica, and proxy_next_upstream retries the
    # request elsewhere. /api/v1/health/ also checks the DB is reachable.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./provena-api
      target: production
    # -E emits task events so celery-exporter can expose task metrics.
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -E
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@pgbouncer:6432/${DB_NAME:-provena}
      DIRECT_DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@db:5432/${DB_NAME:-provena}
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-devsearchkey}
    depends_on:
      - api
    restart: unless-stopped

  beat:
    build:
      context: ./provena-api
      target: production
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@pgbouncer:6432/${DB_NAME:-provena}
      DIRECT_DATABASE_URL: postgres://${DB_USER:-provena}:${DB_PASSWORD:-provena}@db:5432/${DB_NAME:-provena}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
    restart: unless-stopped

  # ── Next.js frontend ──────────────────────────────────────────────────────────

  web:
    build:
      context: ./provena-web
      target: runner
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://nginx}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      - api
    # Readiness gate for the rolling deploy (scripts/deploy.sh), same role as the
    # api healthcheck. /healthz is a static route handler (no rendering/upstream).
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://127.0.0.1:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Reverse proxy ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  typesense_data:

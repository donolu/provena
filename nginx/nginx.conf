# Docker's embedded DNS. Re-resolving the api/web service names on a short TTL
# lets Nginx balance across replicas and pick up containers added or removed
# during a rolling deploy — without an Nginx reload. proxy_next_upstream retries
# a request on another replica if a just-started one briefly refuses it, which
# is what makes rolling deploys zero-downtime (see scripts/deploy.sh).
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Health check endpoint (for load balancers/orchestrators)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Django API
    location /api/ {
        set $api_backend api:8000;
        proxy_pass http://$api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    # Django admin panel and static/media
    location /admin-panel/ {
        set $api_backend api:8000;
        proxy_pass http://$api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_504;
    }

    location /static/ {
        set $api_backend api:8000;
        proxy_pass http://$api_backend;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_504;
    }

    # Django Channels WebSocket
    location /ws/ {
        set $api_backend api:8000;
        proxy_pass http://$api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Next.js frontend — everything else
    location / {
        set $web_backend web:3000;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_504;
        proxy_next_upstream_tries 3;

        # WebSocket support (Next.js HMR in dev, optional)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
